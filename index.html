<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="github_favicon.ico" type="image/x-icon">
    <title></title>
    <style type="text/tailwindcss">
        @theme{
        --font-poppins: "Poppins", sans-serif;
        --breakpoint-mobile: 320px
     }
     .profile-box {
        @apply  border border-gray-300 px-10 py-5 md:w-[350px] mobile:w-[300px]  rounded-xl bg-linear-120 from-gray-950 to-green-800 hover:shadow-lg hover:shadow-gray-800 scroll-smooth
     }
    </style>
</head>

<body class="bg-gray-950 text-gray-300 font-poppins bg-[url(northen_lights.jpg)] bg-cover bg-center bg-no-repeat">

    <main class="h-screen md:p-15 mobile:py-15 flex flex-col  items-center gap-15">
        <div class="relative z-[1] flex items-center">
            <input type="text"
                class="border md:text-xl mobile:text-sm mobile:px-2 mobile:py-1 font-medium  border-gray-300 mobile:w-[200px] mobile:rounded-sm md:w-sm md:p-2 md:rounded-xl mr-3 ">
            <button
                class="border border-gray-300 md:font-medium md:text-xl mobile:text-sm text-white mobile:rounded-sm md:rounded-xl md:px-4 mobile:px-2 mobile:py-1 md:py-2 cursor-pointer bg-green-700 hover:bg-green-600">Search</button>
        </div>
        <div class="relative z-[1]">
            <div id="profile-box">
                <h2 class="text-xl font-bold  text-center text-gray-500">
                    <a id="username-link" class="hover:text-gray-300" href="" target="_blank"></a>
                </h2>
                <div class="flex justify-center mt-4">
                    <img class="rounded-[50%]" src="" alt="" width="200">
                </div>
                <div class="flex flex-col items-center mt-4">
                    <p class="font-medium text-xl text-gray-200" id="name"></p>
                    <p class="mobile:text-sm md:text-md text-gray-400 text-center" id="bio"></p>
                </div>
                <div
                    class="mt-5 mb-2 flex gap-5 justify-center text-md font-medium text-gray-200 hover:text-blue-500 cursor-pointer ">
                    <a id="followers" href="" target="_blank"></a>
                </div>
                <div
                    class="flex mb-2 gap-5 justify-center text-md font-medium text-gray-200 hover:text-blue-500 cursor-pointer ">
                    <a id="following" href="" target="_blank"></a>
                </div>
                <div
                    class="flex mb-2 gap-5 justify-center text-md font-medium text-gray-200 hover:text-blue-500 cursor-pointer ">
                    <a id="repositories" href="" target="_blank"></a>
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
